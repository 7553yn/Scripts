 name: Run Robot Framework tests
 on:
   push: #當成是馬推送到main分之十
     branches:
       - main
   pull_request : #當有針對main分支的拉取請求(pull request)時
     branches:
       - main
   schedule : #定時觸發(UTC時間)
     - cron: '30 5,17 * * *'
   workflow_dispatch: # 手動觸發
 jobs:
   test:
     runs-on: ubuntu-latest
     steps:
       - name: 取得程式碼
         uses: actions/setup-python@v4
         with:
           python-version: '3.12'
      - name: 安裝專案相依套件
        run:|
          python -m pip install --upgrade pip
          pip install -r requirements.txt

        -name: 備份測試結果
          if: always()
          users: actions/upload-artifact@v3
          with:
            name: robot-results
            path: output/ #指定你的輸出目錄
